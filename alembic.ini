# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = app/alembic

# template used to generate migration file names
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(slug)s

# timezone to use when rendering the date within the migration file
# ESTA FUE LA LÍNEA DEL ERROR. DEBE DECIR 'UTC'
timezone = UTC

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# max length of characters for a slug field
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
sourceless = false

# version location specification; this defaults
# to app/alembic/versions.
# version_locations = %(here)s/bar:%(here)s/bat:app/alembic/versions
# version_path_separator = :

# set to 'true' to search for and load revisions in the order of their
# dependency graph
process_revision_directives = false

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S